      --bg:#FDFCF8;--bg2:#F7F5EF;--bg3:#EEEADE;--card:#FFFFFF;

    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:100px;font-size:12px;font-weight:700}

    .btn-g:hover{background:var(--teal-lt)}

<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,createContext,useContext}=React;
const FM=typeof Motion!=='undefined'?Motion:(window.Motion||{});
const motion=FM.motion||{};
const AP=FM.AnimatePresence||(({children})=>children);

/* ── IndexedDB ── */
class DB{
  constructor(){this.n='AtlasDB_v2';this.db=null}
  async open(){if(this.db)return;return new Promise((r,j)=>{const q=indexedDB.open(this.n,2);q.onerror=()=>j(q.error);q.onsuccess=()=>{this.db=q.result;r()};q.onupgradeneeded=e=>{const d=e.target.result;['fin','conv','strat','plan','prefs'].forEach(n=>{if(!d.objectStoreNames.contains(n))d.createObjectStore(n,n==='conv'||n==='plan'?{keyPath:'id',autoIncrement:true}:{keyPath:'k'})})}})}
  async set(s,v){await this.open();return new Promise((r,j)=>{const tx=this.db.transaction([s],'readwrite');const st=tx.objectStore(s);const q=st.put(v);q.onsuccess=()=>r();q.onerror=()=>j(q.error)})}
  async get(s,k){await this.open();return new Promise((r,j)=>{const tx=this.db.transaction([s],'readonly');const q=tx.objectStore(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
  async all(s){await this.open();return new Promise((r,j)=>{const tx=this.db.transaction([s],'readonly');const q=tx.objectStore(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
  async nuke(){await this.open();return Promise.all(['fin','conv','strat','plan'].map(s=>new Promise((r,j)=>{const tx=this.db.transaction([s],'readwrite');const q=tx.objectStore(s).clear();q.onsuccess=()=>r();q.onerror=()=>j(q.error)})))}
}

/* ── Claude API — calls /api/chat proxy (Vercel edge function) ── */
class Claude{
  constructor(){
    // Calls our secure server-side proxy — API key never touches the browser
    this.ep='/api/chat';
    this._apiAvailable=null; // null=unknown, true=working, false=unavailable
  }
  async extract(msg,ctx={}){
    try{
      const r=await fetch(this.ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'extract',messages:[{role:'user',content:msg}]})});
      if(!r.ok){this._apiAvailable=false;throw new Error('proxy_error')}
      const d=await r.json();
      if(d.error){this._apiAvailable=false;throw new Error(d.error)}
      this._apiAvailable=true;
      return{fields:d.fields||{},src:'claude'};
    }catch(e){
      if(this._apiAvailable===null)this._apiAvailable=false;
      return this._fb(msg);
    }
  }
  async chat(msgs,missing){
    try{
      const r=await fetch(this.ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'chat',messages:msgs,missing})});
      if(!r.ok)throw new Error('proxy_error');
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      this._apiAvailable=true;
      return d.text||this._fq(missing[0]);
    }catch{
      return this._fq(missing[0]);
    }
  }
  isAvailable(){return this._apiAvailable!==false}
  _fq(f){const q={monthlyIncome:"What's your monthly take-home income? A rough number is totally fine.",essentialExpenses:"About how much goes to essentials each month — rent, groceries, utilities?",totalSavings:"How much do you currently have saved? This helps me understand your safety net.",highInterestDebt:"Do you carry any high-interest debt, like credit cards? Zero is perfectly fine.",lowInterestDebt:"Any other loans — student debt, car loan?",primaryGoal:"What matters most right now: stability, growth, flexibility?",riskTolerance:"Do you prefer playing it safe, or are you comfortable with some risk for better long-term returns?"};return q[f]||"Tell me a bit more about your financial situation."}
  _fb(t){
    const x={};const n=s=>{const m=s.match(/(\d[\d,]*(?:\.\d+)?)\s*(?:k|thousand)?/i);if(!m)return null;let v=parseFloat(m[1].replace(/,/g,''));if(/k|thousand/i.test(m[0]))v*=1000;return v};
    [/(?:make|earn|salary|income|take.home|bring.in)[^\d$]*(\$?[\d,]+(?:\.\d+)?\s*(?:k|thousand)?)/i,/(\$?[\d,]+(?:\.\d+)?\s*(?:k|thousand)?)\s*(?:per.month|\/mo|a.month|monthly)/i].some(p=>{const m=t.match(p);if(m){const v=n(m[1]);if(v&&v>500&&v<1e6){x.monthlyIncome=v;return true}}});
    if(/rent|essentials|bills|expenses/i.test(t)){const m=t.match(/(?:spend|expense|rent|bill)[^\d$]*(\$?[\d,]+(?:\.\d+)?\s*(?:k|thousand)?)/i);if(m){const v=n(m[1]);if(v&&v>100&&v<1e6)x.essentialExpenses=v}}
    [/(?:saved?|savings?|emergency)[^\d$]*(\$?[\d,]+(?:\.\d+)?\s*(?:k|thousand)?)/i,/(\$?[\d,]+(?:\.\d+)?\s*(?:k|thousand)?)\s*(?:saved?|in.savings)/i].some(p=>{const m=t.match(p);if(m){const v=n(m[1]);if(v>=0){x.totalSavings=v;return true}}});
    const hd=t.match(/(?:credit.card|high.interest)[^\d$]*(\$?[\d,]+(?:\.\d+)?\s*(?:k|thousand)?)/i);if(hd){const v=n(hd[1]);if(v>=0)x.highInterestDebt=v}
    const ld=t.match(/(?:student.loan|car.loan|mortgage)[^\d$]*(\$?[\d,]+(?:\.\d+)?\s*(?:k|thousand)?)/i);if(ld){const v=n(ld[1]);if(v>=0)x.lowInterestDebt=v}
    if(/no\s+(?:debt|loan|credit)|(?:debt|loan).free|zero\s+debt/i.test(t)){if(!('highInterestDebt'in x))x.highInterestDebt=0;if(!('lowInterestDebt'in x))x.lowInterestDebt=0}
    if(/no\s+savings?|zero\s+saved|nothing\s+saved/i.test(t))x.totalSavings=0;
    if(/stable|stability|secure|peace.of.mind/i.test(t))x.primaryGoal='stability';
    else if(/wealth|retire|financial.independence|FIRE|passive/i.test(t))x.primaryGoal='wealth_building';
    else if(/grow|invest|returns|portfolio/i.test(t))x.primaryGoal='growth';
    else if(/flexib|freedom|liquid/i.test(t))x.primaryGoal='flexibility';
    if(/cautious|conservative|risk.averse/i.test(t))x.riskTolerance='cautious';
    else if(/aggressive|bold|high.risk/i.test(t))x.riskTolerance='growth';
    else if(/balanced|moderate/i.test(t))x.riskTolerance='balanced';
    return{fields:x,src:'fallback'}
  }
}

/* ── Strategy Engine ── */
class Engine{
  async run(d){return this._calc(d)}
  _calc(d){
    const inc=d.monthlyIncome||0,ess=d.essentialExpenses||0,dp=d.monthlyDebtPayments||0;
    const hiD=d.highInterestDebt||0,loD=d.lowInterestDebt||0,sav=d.totalSavings||0;
    const bufMo=ess>0?sav/ess:0;const net=inc-ess-dp;
    const disc=d.discretionaryExpenses||Math.max(0,net*.28);
    const futAmt=Math.max(0,net-disc);const futPct=inc>0?futAmt/inc:0;
    const dti=inc>0?(hiD+loD)/(inc*12):0;
    const dExp=hiD>inc*3?'Critical':hiD>inc?'High':hiD>inc*.5?'Moderate':'Low';
    const tier=(net<0||bufMo<1)?'Foundation':(bufMo<3||hiD>inc*2)?'Stabilizing':(bufMo<6||dti>.3)?'Strategic':'GrowthReady';
    const lever=net<0?'stabilize_cashflow':hiD>inc?'eliminate_high_interest_debt':bufMo<3?'build_emergency_buffer':futPct<.15?'increase_future_allocation':'optimize_discretionary_spend';
    const urgency=(lever==='stabilize_cashflow'||dExp==='Critical')?'Protective':(lever==='eliminate_high_interest_debt'||dExp==='High'||bufMo<1)?'Advisory':'Calm';
    const m={bufMo,bufTarget:6,futPct,futTarget:.15,net,disc,dExp,isNeg:net<0,dti};
    const expl=this._expl(tier,lever,urgency,m,d);
    const sug=this._sug(lever,d,m);
    return{tier,lever,urgency,bufMo,futPct,dExp,metrics:m,expl,sug,ts:Date.now()};
  }
  _sug(l,d,m){
    if(l==='build_emergency_buffer'){const gap=Math.max(0,(d.essentialExpenses||0)*6-(d.totalSavings||0));return Math.min(Math.max(0,m.net)*.25,gap/12)||100}
    if(l==='eliminate_high_interest_debt')return Math.max(50,Math.min(Math.max(0,m.net)*.3,(d.highInterestDebt||0)*.05));
    return Math.max(50,Math.max(0,m.net)*.1);
  }
  _expl(tier,lever,urgency,m,d){
    const uk=urgency.toLowerCase();
    const W={
      stabilize_cashflow:{calm:"Your monthly outflow is higher than your inflow right now — this makes every other strategy unstable. We need to restore balance first.",protective:"This needs immediate attention: your outflow exceeds your inflow, and staying here compounds both financial stress and missed opportunities."},
      eliminate_high_interest_debt:{calm:"High-interest debt silently compounds and can outpace most saving or investing moves you'd otherwise make.",advisory:"This is your highest-leverage move right now: high-interest debt erodes progress faster than almost anything else."},
      build_emergency_buffer:{calm:`Your buffer is ${m.bufMo.toFixed(1)} months. Getting to ${m.bufTarget} months transforms your financial resilience and peace of mind.`,advisory:`You're making real progress — moving from ${m.bufMo.toFixed(1)} to ${m.bufTarget} months is the most reliable way to strengthen your position right now.`},
      increase_future_allocation:{calm:`You're putting about ${(m.futPct*100).toFixed(0)}% toward your future. Moving to ${(m.futTarget*100).toFixed(0)}% is what unlocks meaningful long-term momentum.`,advisory:`A small reallocation compounds beautifully: moving toward ${(m.futTarget*100).toFixed(0)}% future allocation accelerates your trajectory from here.`},
      optimize_discretionary_spend:{calm:"Your foundation is solid. The highest leverage now is redirecting any spending that doesn't genuinely match your priorities.",advisory:"This is optimisation, not sacrifice — a small thoughtful reduction here compounds into meaningful progress."}
    };
    const N={
      stabilize_cashflow:{calm:"Let's identify one change that brings your outflow below your inflow this month.",protective:"Let's make one concrete change today — even small — to start restoring balance."},
      eliminate_high_interest_debt:{calm:"Let's target the highest-interest balance first, while keeping your essentials comfortable.",advisory:"Let's focus extra payments on that highest-rate balance — it's the most effective move you can make right now."},
      build_emergency_buffer:{calm:`Let's find a monthly amount that builds toward ${m.bufTarget} months without making life feel tight.`,advisory:`Let's pick one monthly contribution to keep building toward ${m.bufTarget} months.`},
      increase_future_allocation:{calm:"We can do this with one small shift — even 2–3% more makes a real difference over time.",advisory:"Let's reallocate a small percentage this month and see how it feels."},
      optimize_discretionary_spend:{calm:"Let's find one category to gently reduce — without touching anything you actually care about.",advisory:"Let's identify one recurring expense to redirect toward Future You."}
    };
    const why=(W[lever][uk]||W[lever].calm),next=(N[lever][uk]||N[lever].calm);
    const TL={Foundation:{label:'Foundation',emoji:'🪨',reveal:"Based on what you've shared, you're in the Foundation phase.",bridge:"There's a clear path forward from here — and we're going to take it one step at a time.",color:'var(--rose)',bg:'var(--rose-lt)'},Stabilizing:{label:'Stabilizing',emoji:'⚖️',reveal:"Based on what you've shared, you're in the Stabilizing phase.",bridge:"You're building real momentum. One focused move can shift you into the Strategic phase.",color:'var(--amber)',bg:'var(--amber-lt)'},Strategic:{label:'Strategic',emoji:'🧭',reveal:"Based on what you've shared, you're in the Strategic phase.",bridge:"You're in a solid position. Now we refine — this is where smart optimisation starts to compound.",color:'var(--sky)',bg:'var(--sky-lt)'},GrowthReady:{label:'Growth-Ready',emoji:'🚀',reveal:"Based on what you've shared, you're in the Growth-Ready phase.",bridge:"You've built something real. Now we focus on intelligent acceleration — without adding unnecessary risk.",color:'var(--teal)',bg:'var(--teal-lt)'}};
    const trace=[
      {lbl:'Buffer',formula:'Savings ÷ Essentials',in:{savings:`$${(d.totalSavings||0).toLocaleString()}`,essentials:`$${(d.essentialExpenses||0).toLocaleString()}`},out:`${m.bufMo.toFixed(2)} months`,flag:m.bufMo<m.bufTarget?'warn':'ok'},
      {lbl:'Cashflow',formula:'Income − Essentials − Debt payments',in:{income:`$${(d.monthlyIncome||0).toLocaleString()}`,essentials:`$${(d.essentialExpenses||0).toLocaleString()}`,debt:`$${(d.monthlyDebtPayments||0).toLocaleString()}`},out:`$${m.net.toFixed(0)}/mo`,flag:m.isNeg?'err':'ok'},
      {lbl:'Future allocation',formula:'(Net − Discretionary) ÷ Income',in:{net:`$${m.net.toFixed(0)}`,disc:`$${m.disc.toFixed(0)}`},out:`${(m.futPct*100).toFixed(1)}%`,flag:m.futPct<m.futTarget?'warn':'ok'},
      {lbl:'Tier',formula:'Waterfall: cashflow→buffer→debt→allocation',in:{buffer:`${m.bufMo.toFixed(1)}mo`,cashflow:m.isNeg?'negative':'positive',debt:m.dExp},out:tier,flag:'info'},
      {lbl:'Lever selected',formula:'Priority order: cashflow>debt>buffer>allocation>optimize',in:{tier},out:lever.replace(/_/g,' '),flag:'info'}
    ];
    const obs=[];
    if(m.isNeg)obs.push("Your monthly outflow exceeds your inflow — this is the most urgent thing to address.");
    if(m.dExp==='High'||m.dExp==='Critical')obs.push("Your debt pressure is high enough to slow progress unless prioritised.");
    else if(m.dExp==='Moderate')obs.push("Debt pressure is manageable, but still affects momentum.");
    if(m.bufMo<m.bufTarget)obs.push(`Buffer (${m.bufMo.toFixed(1)} months) is below the ${m.bufTarget}-month target.`);
    if(m.futPct<m.futTarget)obs.push(`Future allocation (${(m.futPct*100).toFixed(0)}%) is below the ${(m.futTarget*100).toFixed(0)}% target.`);
    const reasons={stabilize_cashflow:"Stabilising cashflow restores control and stops compounding stress.",eliminate_high_interest_debt:"High-interest debt compounds quickly and quietly erases progress elsewhere.",build_emergency_buffer:"A stronger buffer increases resilience and makes every next decision safer.",increase_future_allocation:"Growing future allocation builds long-term momentum without requiring lifestyle disruption.",optimize_discretionary_spend:"Optimising spending frees up real leverage while keeping your lifestyle intact."};
    return{tier,lever,urgency,why,next,tl:TL[tier],trace,obs,reason:reasons[lever],inputs:[`Income: $${(d.monthlyIncome||0).toLocaleString()}/mo`,`Essentials: $${(d.essentialExpenses||0).toLocaleString()}/mo`,`Savings: $${(d.totalSavings||0).toLocaleString()}`,`High-interest debt: $${(d.highInterestDebt||0).toLocaleString()}`],control:"Atlas recommends — you decide. You can always ask questions or adjust anything."};
  }
}

/* ── Shared state ── */
const Ctx=createContext();
const useA=()=>useContext(Ctx);
const fc=n=>n>=1000?`$${(n/1000).toFixed(n%1000===0?0:1)}k`:`$${Math.round(n).toLocaleString()}`;
const fp=n=>`${(n*100).toFixed(0)}%`;
const TIERS=[{id:'Foundation',lbl:'Foundation',em:'🪨',desc:'Building the base',c:'var(--rose)',b:'var(--rose-lt)'},{id:'Stabilizing',lbl:'Stabilizing',em:'⚖️',desc:'Finding balance',c:'var(--amber)',b:'var(--amber-lt)'},{id:'Strategic',lbl:'Strategic',em:'🧭',desc:'Optimising well',c:'var(--sky)',b:'var(--sky-lt)'},{id:'GrowthReady',lbl:'Growth-Ready',em:'🚀',desc:'Compounding forward',c:'var(--teal)',b:'var(--teal-lt)'}];
const tc=id=>TIERS.find(t=>t.id===id)||TIERS[0];

/* ── Logo ── */
const Logo=({sz=36,txt=true})=>(
  <div style={{display:'flex',alignItems:'center',gap:10}}>
    <div style={{width:sz,height:sz,background:'linear-gradient(135deg,#0A7C6E,#1D6FA4)',borderRadius:Math.round(sz*.28),display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 2px 8px rgba(10,124,110,0.28)'}}>
      <span style={{color:'#fff',fontFamily:'Lora,serif',fontWeight:700,fontSize:Math.round(sz*.5),lineHeight:1}}>A</span>
    </div>
    {txt&&<span style={{fontFamily:'Lora,serif',fontWeight:700,fontSize:Math.round(sz*.58),color:'var(--ink)',letterSpacing:'-.02em'}}>Atlas</span>}
  </div>
);

/* ── Tier Ladder ── */
const Ladder=({cur,compact=false})=>{
  const ci=TIERS.findIndex(t=>t.id===cur);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:compact?6:10}}>
      {[...TIERS].reverse().map((t,ri)=>{
        const ri2=TIERS.length-1-ri;
        const isCur=t.id===cur,isPast=ri2<ci;
        return(

const NEED=['monthlyIncome','essentialExpenses','totalSavings','highInterestDebt','lowInterestDebt'];

  const{db,claude,engine,theme,setTheme}=useA();
  const[msgs,setMsgs]=useState([{r:'a',t:"Hey, I'm glad you're here.\n\nI'm not going to ask you to connect your bank or fill out a form. I just want to understand your situation — in your own words.\n\nWhat's on your mind when it comes to money right now?"}]);
  const[inp,setInp]=useState('');
  const[fin,setFin]=useState({monthlyIncome:0,essentialExpenses:0,totalSavings:0,highInterestDebt:null,lowInterestDebt:null,monthlyDebtPayments:0,primaryGoal:'stability',riskTolerance:'balanced',timeHorizonYears:3});
  const[busy,setBusy]=useState(false);
  const[prog,setProg]=useState(0);
  const bot=useRef();
  useEffect(()=>{bot.current?.scrollIntoView({behavior:'smooth'})},[msgs]);
  const missing=useCallback(f=>NEED.filter(k=>f[k]===null||f[k]===undefined),[]);
  const calcP=useCallback(f=>Math.round(NEED.filter(k=>f[k]!==null&&f[k]!==undefined).length/NEED.length*100),[]);
  const send=useCallback(async()=>{
    if(!inp.trim()||busy)return;
    const ut=inp.trim();setInp('');
    const nm=[...msgs,{r:'u',t:ut}];setMsgs(nm);setBusy(true);
    const{fields}=await claude.extract(ut,fin);
    const uf={...fin};Object.entries(fields).forEach(([k,v])=>{if(v!==undefined&&v!==null)uf[k]=v});
    setFin(uf);await db.set('fin',{k:'cur',...uf,ts:Date.now()});
    setProg(calcP(uf));
    const miss=missing(uf);
    if(miss.length===0){
      const b=await engine.run(uf);await db.set('strat',{k:'cur',...b});
      const rm=[...nm,{r:'a',t:"Perfect — I have everything I need.\n\nLet me show you where you stand."}];setMsgs(rm);setBusy(false);
      setTimeout(()=>onDone({fin:uf,baseline:b}),1600);
    }else{
      const am=nm.map(m=>({role:m.r==='u'?'user':'assistant',content:m.t}));
      const q=await claude.chat(am,miss);
      setMsgs([...nm,{r:'a',t:q}]);setBusy(false);
    }
  },[inp,busy,msgs,fin,claude,db,engine,missing,calcP,onDone]);

              <div style={{width:`${prog}%`,height:'100%',background:'linear-gradient(90deg,var(--teal),var(--sky))',borderRadius:3,transition:'width .4s ease'}}/>
            </div>
            <span style={{fontSize:11,color:'var(--ink3)',fontWeight:600}}>Building strategy…</span>
          </div>

            {theme==='dark'?'☀️':'🌙'}
          </button>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'28px 20px'}}>
        <div style={{maxWidth:660,margin:'0 auto'}}>

            </button>
            <button onClick={()=>setConfirm(true)} style={{textAlign:'left',display:'flex',alignItems:'center',gap:9,background:'var(--rose-lt)',border:'1px solid rgba(184,64,64,.18)',borderRadius:14,padding:'12px 15px',color:'var(--rose)',fontFamily:'Nunito,sans-serif',fontWeight:600,fontSize:13,cursor:'pointer'}}>
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              Delete all my data
            </button>
          </div>
        </div>
      </div>
      <AP>
        {confirm&&(
          <div onClick={e=>{if(e.target===e.currentTarget)setConfirm(false)}} style={{position:'fixed',inset:0,background:'rgba(28,24,20,.55)',display:'flex',alignItems:'center',justifyContent:'center',padding:24,zIndex:100}}>
            <div className="card-lg" style={{width:'100%',maxWidth:360,padding:'30px',background:'var(--card)'}}>
              <h3 className="serif" style={{fontSize:19,fontWeight:700,color:'var(--ink)',marginBottom:8}}>Delete all data?</h3>
              <p style={{fontSize:13,color:'var(--ink2)',lineHeight:1.65,marginBottom:22}}>This permanently removes all your financial data, conversations, and strategies from this device. This cannot be undone.</p>
              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>setConfirm(false)} className="btn btn-s" style={{flex:1,justifyContent:'center'}}>Cancel</button>
                <button onClick={()=>{setConfirm(false);onDelete()}} style={{flex:1,background:'var(--rose)',color:'#fff',border:'none',borderRadius:14,padding:'12px',fontFamily:'Nunito,sans-serif',fontWeight:700,fontSize:14,cursor:'pointer'}}>Yes, delete</button>
              </div>
            </div>
          </div>
        )}
      </AP>
    </div>
  );
};

/* ── ROOT ── */
const db=new DB(),claude=new Claude(),engine=new Engine();

function App(){
  const[theme,setTheme]=useState('light');
  const[scr,setScr]=useState('landing');
  const[sess,setSess]=useState(null);
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);db.set('prefs',{k:'theme',v:theme});},[theme]);
  useEffect(()=>{
    Promise.all([db.get('fin','cur'),db.get('strat','cur')]).then(([f,s])=>{if(f&&s&&f.monthlyIncome>0){setSess({fin:f,baseline:s});setScr('dashboard')}}).catch(()=>{});
    db.get('prefs','theme').then(p=>{if(p?.v)setTheme(p.v)}).catch(()=>{});
  },[]);
  const doExport=async()=>{
    const[f,c,s,p]=await Promise.all([db.get('fin','cur'),db.all('conv'),db.get('strat','cur'),db.all('plan')]);
    const blob=new Blob([JSON.stringify({financialData:f,conversations:c,strategy:s,planSteps:p},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`atlas-export-${Date.now()}.json`;a.click();URL.revokeObjectURL(url);
  };
  const doDelete=async()=>{await db.nuke();setSess(null);setScr('landing')};
  const ctx={theme,setTheme,db,claude,engine};

  const pages={
    landing:<S1 onStart={()=>setScr('conversation')}/>,
    conversation:<S2 onDone={d=>{setSess(d);setScr('summary')}}/>,
    summary:sess&&<S3 fin={sess.fin} baseline={sess.baseline} onCont={()=>setScr('tierReveal')}/>,
    tierReveal:sess&&<S4 fin={sess.fin} baseline={sess.baseline} onDash={()=>setScr('dashboard')} onAction={()=>{}}/>,
    dashboard:sess&&<S6 fin={sess.fin} baseline={sess.baseline} onTalk={()=>setScr('conversation')} onNav={setScr}/>,
    strategy:sess&&<S7 fin={sess.fin} baseline={sess.baseline} onBack={()=>setScr('dashboard')}/>,
    settings:<S8 onBack={()=>setScr('dashboard')} onDelete={doDelete} onExport={doExport}/>
  };

  return(
    <Ctx.Provider value={ctx}>
      <AP mode="wait">
        <div key={scr} style={{opacity:1}}>
          {pages[scr]||pages.landing}
        </div>
      </AP>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
