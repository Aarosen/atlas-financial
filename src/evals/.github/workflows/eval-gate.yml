# ─────────────────────────────────────────────────────────────────────────────
# Atlas AI Eval Gate — GitHub Actions CI/CD
# Runs automatically on every push and pull request.
# Blocks deployment if any CRITICAL eval fails.
# ─────────────────────────────────────────────────────────────────────────────

name: Atlas AI Eval Gate

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  eval-gate:
    name: Run Atlas Eval Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: atlas-evals/package-lock.json

      - name: Install dependencies
        working-directory: atlas-evals
        run: npm ci

      # Phase 1: Code-based evals (fast, free, no API calls)
      - name: Phase 1 — Code Evals (Keyword + Calc + Limits)
        working-directory: atlas-evals
        run: npx ts-node src/runner.ts --mode=gate --code-only
        # Fails fast if any CRITICAL code eval fails

      # Phase 2: LLM judge evals (requires API key)
      - name: Phase 2 — LLM Judge Evals (Safety + Accuracy + Teaching)
        working-directory: atlas-evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx ts-node src/runner.ts --mode=gate
        # Exit code 1 = blockers found = deployment halted

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()   # upload even on failure so you can inspect
        with:
          name: atlas-eval-report-${{ github.sha }}
          path: atlas-evals/eval-report-*.json
          retention-days: 30

      - name: Comment PR with eval results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reports = fs.readdirSync('atlas-evals').filter(f => f.startsWith('eval-report-'));
            if (reports.length > 0) {
              const report = JSON.parse(fs.readFileSync(`atlas-evals/${reports[0]}`, 'utf8'));
              const status = report.gatePass ? '✅ PASS' : '🚫 BLOCKED';
              const body = `## Atlas AI Eval Gate: ${status}
              
**Run:** \`${report.runId}\`
**Total evals:** ${report.totalEvals} | ✅ ${report.passed} | ❌ ${report.failed} | ⚠️ ${report.warnings}

${report.blockers.length > 0 ? `### 🚨 Critical Failures\n${report.blockers.map(b => `- \`[${b.id}]\` ${b.name}: ${b.reason.substring(0, 100)}`).join('\n')}` : '### All critical gates passed'}`;
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
